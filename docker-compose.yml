services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polycopy
      POSTGRES_PASSWORD: polycopy
      POSTGRES_DB: polycopy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polycopy"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    command: polycopy-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://polycopy:polycopy@db:5432/polycopy
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  bot:
    build: ./backend
    command: polycopy-bot
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://polycopy:polycopy@db:5432/polycopy
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./backend
    command: polycopy-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://polycopy:polycopy@db:5432/polycopy
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
